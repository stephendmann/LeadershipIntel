version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # Majors are deliberate, tested migrations — not auto-bumps.
      # See MAINTENANCE.md. Remove an entry here when starting that migration.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # 3.14.0+ requires Node >=22; repo is Node 20 (engines, .nvmrc, Dockerfile).
      # Pinned at 3.13.0 in package.json — lift this when moving to Node 22.
      - dependency-name: "@waline/client"
        versions: [">3.13.0"]
