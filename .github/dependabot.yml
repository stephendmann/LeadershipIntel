version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # Majors are deliberate, tested migrations — not auto-bumps.
      # See MAINTENANCE.md. Narrow this when starting a migration.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
