version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # Majors are deliberate, tested migrations — not auto-bumps.
      # See MAINTENANCE.md. Narrow this when starting a migration.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Pinned at 3.13.0 in package.json since the Node 20 era; the Node >=22
      # blocker is gone (engines >=22 <25) — unpin deliberately when convenient.
      - dependency-name: "@waline/client"
        versions: [">3.13.0"]
